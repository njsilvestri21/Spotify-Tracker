@import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=JetBrains+Mono:wght@400;600;700&display=swap');

:root{
  --bg:#0c110d; --panel:#131a15; --panel2:#17211a;
  --line:rgba(30,215,96,.10); --line2:rgba(30,215,96,.18);
  --txt:#ecf5ee; --dim:#90a698; --faint:#5b7263;
  --grn:#1ed760; --grn-deep:#16a34a; --mint:#4ade80; --ok:#34d399; --bad:#fb7185; --pod:#2dd4bf;
}
html, body{ overflow-x:hidden; }
.hr-app{
  min-height:100vh; overflow-x:clip; overflow-wrap:break-word; color:var(--txt);
  background:
    radial-gradient(1000px 460px at 85% -8%, rgba(30,215,96,.13), transparent 60%),
    radial-gradient(760px 400px at -10% 104%, rgba(74,222,128,.06), transparent 55%),
    var(--bg);
  font-family:'Bricolage Grotesque', system-ui, -apple-system, sans-serif;
  -webkit-font-smoothing:antialiased;
}
.mono{ font-family:'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace; }
.display{ font-weight:800; letter-spacing:-0.015em; }
.card{ background:var(--panel); border:1px solid var(--line); border-radius:16px; }
.microlabel{ font-family:'JetBrains Mono', ui-monospace, monospace; font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--dim); font-weight:600; }
.c-dim{ color:var(--dim); } .c-faint{ color:var(--faint); }
.c-grn{ color:var(--grn); } .c-mint{ color:var(--mint); } .c-ok{ color:var(--ok); } .c-bad{ color:var(--bad); } .c-pod{ color:var(--pod); }

.btn{ display:inline-flex; align-items:center; gap:8px; border-radius:12px; padding:10px 16px;
  font-family:'JetBrains Mono', monospace; font-size:12px; font-weight:600; letter-spacing:.04em;
  cursor:pointer; user-select:none; transition:transform .12s ease, background .15s ease, border-color .15s ease; border:1px solid transparent; }
.btn:active{ transform:scale(.97); }
.btn-primary{ background:var(--grn); color:#06180c; }
.btn-primary:hover{ background:#3ce27d; }
.btn-ghost{ background:transparent; border-color:var(--line2); color:var(--txt); }
.btn-ghost:hover{ border-color:var(--grn); }
.btn-danger{ background:transparent; border-color:rgba(251,113,133,.35); color:var(--bad); }
.btn[disabled]{ opacity:.45; cursor:default; }

.chip{ font-family:'JetBrains Mono', monospace; font-size:11px; font-weight:600; letter-spacing:.05em;
  padding:6px 12px; border-radius:999px; border:1px solid var(--line2); color:var(--dim);
  cursor:pointer; white-space:nowrap; transition:all .15s ease; background:transparent; }
.chip:hover{ color:var(--txt); }
.chip-on{ background:var(--grn); border-color:var(--grn); color:#06180c; }

.tab{ font-family:'JetBrains Mono', monospace; font-size:11px; font-weight:600; letter-spacing:.06em;
  padding:8px 4px; color:var(--dim); border-bottom:2px solid transparent; cursor:pointer; text-transform:uppercase; background:transparent; border-top:none; border-left:none; border-right:none;}
.tab-on{ color:var(--txt); border-bottom-color:var(--mint); }

.seg{ display:flex; border:1px solid var(--line2); border-radius:10px; overflow:hidden; }
.seg button{ font-family:'JetBrains Mono', monospace; font-size:10px; font-weight:600; letter-spacing:.08em;
  padding:6px 10px; color:var(--dim); background:transparent; border:none; cursor:pointer; text-transform:uppercase; }
.seg button.on{ background:rgba(30,215,96,.15); color:var(--grn); }

.dropzone{ border:1.5px dashed var(--line2); border-radius:20px; transition:all .2s ease; }
.dropzone.hot{ border-color:var(--grn); background:rgba(30,215,96,.06); }

.searchbox{ background:var(--panel2); border:1px solid var(--line); border-radius:10px; color:var(--txt);
  font-family:'JetBrains Mono', monospace; font-size:12px; padding:8px 10px 8px 32px; width:100%; outline:none; }
.searchbox:focus{ border-color:var(--grn); }
.searchbox::placeholder{ color:var(--faint); }

.eq{ display:flex; align-items:flex-end; gap:3px; height:22px; }
.eq span{ width:4px; border-radius:2px; background:linear-gradient(to top, var(--grn-deep), var(--grn)); animation:eq 1.1s ease-in-out infinite; }
.eq span:nth-child(1){ height:35%; animation-delay:0s; }
.eq span:nth-child(2){ height:90%; animation-delay:.18s; }
.eq span:nth-child(3){ height:55%; animation-delay:.36s; }
.eq span:nth-child(4){ height:75%; animation-delay:.5s; }
@keyframes eq{ 0%,100%{ transform:scaleY(.55);} 50%{ transform:scaleY(1);} }
@media (prefers-reduced-motion: reduce){ .eq span{ animation:none; } }

.livedot{ width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,.15); flex:none; }
.livedot-on{ background:var(--grn); animation:pulse 2s ease-out infinite; }
@keyframes pulse{ 0%{ box-shadow:0 0 0 0 rgba(30,215,96,.45);} 100%{ box-shadow:0 0 0 10px rgba(30,215,96,0);} }
@media (prefers-reduced-motion: reduce){ .livedot-on{ animation:none; } }

.wavebar{ transition:height .5s ease; }
::-webkit-scrollbar{ height:6px; width:6px; }
::-webkit-scrollbar-thumb{ background:rgba(30,215,96,.25); border-radius:3px; }
.nowrap-scroll{ scrollbar-width:thin; overscroll-behavior-x:contain; }
button:focus-visible, input:focus-visible{ outline:2px solid var(--grn); outline-offset:2px; }
@keyframes cardin{ from{ opacity:0; transform:translateY(10px);} to{ opacity:1; transform:none;} }
